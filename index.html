<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上商店</title>
    <link rel="stylesheet" href="client/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-align: center;">
        <h1 style="font-size: 3rem; margin-bottom: 2rem;">線上商店系統</h1>
        <p style="font-size: 1.2rem; margin-bottom: 3rem;">請選擇您要進入的介面</p>
        
        <div style="display: flex; gap: 2rem;">
            <a href="client/index.html" style="padding: 1.5rem 3rem; background: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 10px; color: white; text-decoration: none; font-size: 1.1rem; backdrop-filter: blur(10px); transition: all 0.3s ease;">
                <i class="fas fa-shopping-cart" style="margin-right: 0.5rem;"></i>
                客戶端
            </a>
            
            <a href="admin/index.html" style="padding: 1.5rem 3rem; background: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 10px; color: white; text-decoration: none; font-size: 1.1rem; backdrop-filter: blur(10px); transition: all 0.3s ease;">
                <i class="fas fa-cog" style="margin-right: 0.5rem;"></i>
                管理端
            </a>
        </div>
        
        <div style="margin-top: 3rem; opacity: 0.8;">
            <p>預設管理員帳號：admin / admin123</p>
        </div>
    </div>
</body>
</html>
